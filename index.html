<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Score Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom animation for the crown */
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
      50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
    }
    .animate-bounce-slow {
      animation: bounce-slow 2s infinite;
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Inline SVG Icon Components
    const Trophy = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>);
    const RotateCcw = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
    const Plus = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>);
    const Check = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>);
    const Edit2 = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>);
    const Trash2 = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
    const Minus = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>);

    function App() {
      const [players, setPlayers] = useState([
        { id: 1, name: 'Player 1', score: 0, isEditing: false }
      ]);

      const highestScore = Math.max(...players.map(p => p.score), 0);

      const addPlayer = () => {
        const newId = players.length > 0 ? Math.max(...players.map(p => p.id)) + 1 : 1;
        setPlayers([
          ...players, 
          { id: newId, name: `Player ${newId}`, score: 0, isEditing: true }
        ]);
      };

      const removePlayer = (id) => {
        setPlayers(players.filter(p => p.id !== id));
      };

      const incrementScore = (id) => {
        setPlayers(players.map(p => 
          p.id === id ? { ...p, score: p.score + 1 } : p
        ));
      };

      const decrementScore = (id) => {
        setPlayers(players.map(p => 
          p.id === id ? { ...p, score: Math.max(0, p.score - 1) } : p
        ));
      };

      const toggleEdit = (id) => {
        setPlayers(players.map(p => 
          p.id === id ? { ...p, isEditing: !p.isEditing } : p
        ));
      };

      const updateName = (id, newName) => {
        setPlayers(players.map(p => 
          p.id === id ? { ...p, name: newName } : p
        ));
      };

      const handleKeyDown = (e, id) => {
        if (e.key === 'Enter') {
          toggleEdit(id);
        }
      };

      const resetAllScores = () => {
        if (window.confirm("Are you sure you want to reset all scores to 0?")) {
          setPlayers(players.map(p => ({ ...p, score: 0 })));
        }
      };

      return (
        <div className="min-h-screen p-2 sm:p-4 md:p-8 font-sans selection:bg-indigo-200">
          <div className="max-w-2xl mx-auto">
            
            {/* Header */}
            <header className="flex flex-col sm:flex-row justify-between items-center mb-4 sm:mb-6 gap-3 bg-white p-4 sm:p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 text-indigo-600">
                <Trophy className="w-7 h-7" />
                <h1 className="text-2xl font-bold tracking-tight text-slate-800">Trivia Tracker</h1>
              </div>
              
              <div className="flex gap-2 w-full sm:w-auto">
                <button 
                  onClick={resetAllScores}
                  className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors active:scale-95 text-sm"
                >
                  <RotateCcw className="w-4 h-4" />
                  Reset
                </button>
                <button 
                  onClick={addPlayer}
                  className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold shadow-sm transition-colors active:scale-95 text-sm"
                >
                  <Plus className="w-4 h-4" />
                  Add Player
                </button>
              </div>
            </header>

            {/* Players Stack */}
            <div className="flex flex-col gap-2">
              {players.length === 0 ? (
                <div className="py-12 text-center text-slate-500 bg-white rounded-xl border border-dashed border-slate-300">
                  <p className="text-lg">No players added yet.</p>
                  <p className="text-sm">Click "Add Player" to start tracking scores!</p>
                </div>
              ) : (
                players.map((player) => (
                  <PlayerCard 
                    key={player.id} 
                    player={player} 
                    highestScore={highestScore}
                    updateName={updateName}
                    handleKeyDown={handleKeyDown}
                    toggleEdit={toggleEdit}
                    removePlayer={removePlayer}
                    incrementScore={incrementScore}
                    decrementScore={decrementScore}
                  />
                ))
              )}
            </div>

          </div>
        </div>
      );
    }

    function PlayerCard({ 
      player, highestScore, updateName, handleKeyDown, 
      toggleEdit, removePlayer, incrementScore, decrementScore 
    }) {
      const isWinner = player.score > 0 && player.score === highestScore;
      const inputRef = useRef(null);

      useEffect(() => {
        if (player.isEditing && inputRef.current) {
          inputRef.current.focus();
          inputRef.current.select();
        }
      }, [player.isEditing]);

      return (
        <div className={`relative flex items-center bg-white rounded-xl p-3 shadow-sm border transition-all ${
          isWinner ? 'border-amber-300 ring-2 ring-amber-50' : 'border-slate-200'
        }`}>
          
          {/* Winner Crown */}
          {isWinner && (
            <div className="absolute -top-2 -left-2 bg-amber-400 text-white p-1 rounded-full shadow-md animate-bounce-slow">
              <Trophy className="w-3 h-3" />
            </div>
          )}

          {/* Name Section */}
          <div className="flex-1 min-w-0 mr-3">
            {player.isEditing ? (
              <input
                ref={inputRef}
                type="text"
                value={player.name}
                onChange={(e) => updateName(player.id, e.target.value)}
                onKeyDown={(e) => handleKeyDown(e, player.id)}
                onBlur={() => toggleEdit(player.id)}
                className="w-full text-base font-bold text-slate-800 bg-slate-50 border-2 border-indigo-300 rounded-lg px-2 py-1 outline-none"
                placeholder="Name..."
              />
            ) : (
              <h2 className="text-lg font-bold text-slate-800 truncate cursor-pointer pl-1" onClick={() => toggleEdit(player.id)}>
                {player.name}
              </h2>
            )}
          </div>

          {/* Score Controls */}
          <div className="flex items-center gap-1 sm:gap-3 bg-slate-50 rounded-lg p-1 border border-slate-100 mr-2 shrink-0">
            <button
              onClick={() => decrementScore(player.id)}
              disabled={player.score === 0}
              className="p-1.5 sm:p-2 bg-white hover:bg-slate-100 disabled:opacity-50 text-slate-600 rounded-md shadow-sm transition-colors active:scale-95"
              aria-label="Decrease Score"
            >
              <Minus className="w-4 h-4 sm:w-5 sm:h-5" />
            </button>
            
            <span className="w-8 sm:w-10 text-center text-xl sm:text-2xl font-black text-slate-800 tabular-nums tracking-tighter">
              {player.score}
            </span>
            
            <button
              onClick={() => incrementScore(player.id)}
              className="p-1.5 sm:p-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-md shadow-sm transition-colors active:scale-95"
              aria-label="Increase Score"
            >
              <Plus className="w-4 h-4 sm:w-5 sm:h-5" />
            </button>
          </div>

          {/* Action Buttons */}
          <div className="flex flex-col sm:flex-row gap-1 shrink-0">
            <button onClick={() => toggleEdit(player.id)} className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-md transition-colors" title="Edit Name">
              {player.isEditing ? <Check className="w-4 h-4 text-emerald-500" /> : <Edit2 className="w-4 h-4" />}
            </button>
            <button onClick={() => removePlayer(player.id)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-md transition-colors" title="Remove Player">
              <Trash2 className="w-4 h-4" />
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
